name: Manual trigger
on:
  workflow_dispatch:
    inputs:
        input_product:
          description: 'Product you want to order. Enter exact product name, else, test will fail'
          required: true
          default: 'Digital Air Fryer 4.2L'
          type: string
      
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        product_name: ${{ inputs.input_product }}
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    